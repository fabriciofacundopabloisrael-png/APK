name: Android CI

# Compila la app automáticamente en cada push/PR a main, y también se puede
# lanzar a mano desde la pestaña "Actions" de GitHub (workflow_dispatch).
# No depende de Android Studio: todo corre con Gradle en un runner Ubuntu.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # El proyecto Android no está en la raíz del repo, sino en esta subcarpeta.
    defaults:
      run:
        working-directory: AquaSmartApp33

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compilar APK (debug)
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Subir APK como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: AquaSmart-apk
          path: AquaSmartApp33/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
